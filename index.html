<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
</head>
<body>
    <div class="container mb-5 mt-2">
        <header>
            <div id="top-bar">
                <ul id="top-bar-left">
                    <li>Bisnis</li>
                    <li>Perusahaan</li>
                </ul>
                <ul id="top-bar-right">
                    <li>Gerai Online</li>
                    <li>Bantuan</li>
                    <li>Blog</li>
                    <li>Gerai Lokasi</li>
                    <li><span id="bahasa">ID</span> | EN</li>
                </ul>
            </div>
            <div id="navigation-bar">
                <img src="https://im3-img.indosatooredoo.com/indosatassets/images/logo_Personal_IM3.svg" alt="IM3 logo" width="80px">
                <ul id="navigation-bar-left">
                    <li>What's Hot</li>
                    <li>produk & Paket</li>
                    <li>Digital Lifestyle</li>
                    <li>Promo</li>
                    <li>myIM3</li>
                    <li>Shop</li>
                </ul>
                <ul id="navigation-bar-right">
                    <li>
                        <button id="button-masuk">Masuk</button>
                    </li>
                    <li>
                        <button id="button-daftar">Daftar</button>
                    </li>
                    <li>
                        <button id="search">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                            </svg>
                        </button>
                    </li>
                </ul>
            </div>
        </header>
    </div>
    <div id="main-picture">
        <img src="https://im3-img.indosatooredoo.com/dataprod/portalcontent/portal/images/metaimages/638325439051165310.webp" alt="main picture">
    </div>
    <div class="container my-5">
        <div id="product-catalog">
            <ul id="product-catalog-items">
                <div id="product-catalog-cari">
                    <li>
                        <h2>Apa yang kamu cari</h2>
                    </li>
                </div>
                <div id="product-catalog-sim">
                    <img src="https://im3-img.indosatooredoo.com/dataprod/portalcontent/portal/images/metaimages/638218217985019202.svg" alt="SIM">
                    <li>Beli eSIM dan SIM</li>
                </div>
                <div id="product-catalog-aktivasi">
                    <img src="https://im3-img.indosatooredoo.com/dataprod/portalcontent/portal/images/metaimages/637408750986624723.svg" alt="Kartu Perdana">
                    <li>Aktivasi Kartu Perdana</li>
                </div>
                <div id="product-catalog-beli">
                    <img src="https://im3-img.indosatooredoo.com/dataprod/portalcontent/portal/images/metaimages/637408746260887022.svg" alt="Paket Data">
                    <li> Beli Paket Data</li>
                </div>
                <div id="product-catalog-isiulang">
                    <img src="https://im3-img.indosatooredoo.com/dataprod/portalcontent/portal/images/metaimages/637408749330458684.svg" alt="Isi Ulang">
                    <li>Isi Ulang Pulsa</li>
                </div>
            </ul>
    
        </div>  
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
